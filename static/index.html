<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Un-Reader Dashboard</title>
  <style>
    /* --- KINDLE E-INK AESTHETIC --- */
    * {
      box-sizing: border-box;
      transition: none !important;
      animation: none !important;
      border-radius: 0 !important;
    }

    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #000000;
      --border-width: 3px;
      --body-font: "Courier New", Courier, monospace;
    }

    body.dark-mode {
      --bg-color: #000000;
      --text-color: #ffffff;
      --border-color: #ffffff;
    }

    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      font-family: var(--body-font); user-select: none;
      border: var(--border-width) solid var(--border-color);
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; font-weight: 900;
      border-bottom: var(--border-width) solid var(--border-color);
    }

    .dashboard-container { padding: 20px; }
    
    .apps-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
    }

    .app-item {
      display: flex; align-items: center; justify-content: center;
      text-align: center; cursor: pointer; padding: 20px;
      border: var(--border-width) solid var(--border-color);
      font-weight: 900; text-transform: uppercase;
    }

    .app-item:active { background: var(--text-color); color: var(--bg-color); }

    .fullscreen-view {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); z-index: 2000; padding: 20px;
      border: var(--border-width) solid var(--border-color);
    }

    .modal-btn {
      border: var(--border-width) solid var(--text-color);
      background: var(--bg-color); color: var(--text-color);
      font-weight: 900; padding: 10px; cursor: pointer; width: 100%; margin-bottom: 10px;
    }

    .modal-btn:active { background: var(--text-color); color: var(--bg-color); }

    .flash-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; pointer-events: none; background: var(--text-color);
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <span>UN-READER</span>
    <span style="cursor:pointer" id="settings-trigger">[SETTINGS]</span>
  </div>

  <div class="dashboard-container">
    <div class="apps-grid" id="apps-container"></div>
  </div>

  <div class="fullscreen-view" id="settings-view">
    <button class="modal-btn" onclick="document.getElementById('settings-view').style.display='none'">[BACK]</button>
    <button class="modal-btn" id="toggle-darkmode">TOGGLE DARK/LIGHT</button>
    <button class="modal-btn" id="force-refresh-btn">FLUSH SCREEN</button>
  </div>

  <script>
    const APP_DATABASE = [
      { name: 'CHAT', url: 'chat.html' },
      { name: 'TOPICS', url: 'topics.html' },
      { name: 'NEIGHBOURHOOD', url: 'neighbourhood.html' },
      { name: 'AI ASSISTANT', url: 'chatai.html' },
      { name: 'CALCULATOR', url: 'calc.html' },
      { name: 'DISCORD', url: 'https://discord.gg/6jdVebZZQu' },
      { name: 'REKINDLE', url: 'rekindle.html' },
      { name: 'MODERATION', url: 'modmenu.html', req: 'mod' },
      { name: 'SETTINGS', onclick: () => document.getElementById('settings-view').style.display='block' }
    ];

    function buildGrid() {
      const container = document.getElementById('apps-container');
      const rank = localStorage.getItem('unreader-rank') || 'user';
      container.innerHTML = '';
      APP_DATABASE.forEach(app => {
        if (app.req === 'mod' && rank !== 'mod') return;
        const div = document.createElement('div');
        div.className = 'app-item';
        div.innerHTML = app.name;
        div.onclick = () => {
          if (app.onclick) app.onclick();
          else if (app.url) window.location.href = app.url;
        };
        container.appendChild(div);
      });
    }

    // Refresh Logic
    function flash() {
      const f = document.createElement('div');
      f.className = 'flash-overlay';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 150);
    }

    document.getElementById('force-refresh-btn').onclick = flash;
    document.getElementById('settings-trigger').onclick = () => document.getElementById('settings-view').style.display='block';
    document.getElementById('toggle-darkmode').onclick = () => document.body.classList.toggle('dark-mode');

    buildGrid();
  </script>
</body>
</html>
